<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Monochrome app icon — black rounded card, white "L"-mark glyph. -->
  <rect width="256" height="256" rx="48" fill="#000000"/>
  <rect x="3" y="3" width="250" height="250" rx="46" fill="none"
        stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
  <!-- Stylised "Lumen" mark: a vertical L stroke + a curved D-arc. -->
