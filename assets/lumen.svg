    M 76 64
    L 100 64
    L 100 178
    L 152 178
    L 152 200
    L 76 200
    Z"/>
  <path fill="#ffffff" d="
    M 132 64
    L 168 64
    Q 200 64 200 96
    L 200 168
    Q 200 200 168 200
    L 132 200
    Z
    M 156 88
    L 156 176
    L 168 176
    Q 176 176 176 168
    L 176 96
    Q 176 88 168 88
    Z"/>
</svg>
